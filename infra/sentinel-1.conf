# Redis Sentinel config (instance 1 of 3).
#
# Quorum = 2 means: two of three Sentinels must agree before failover starts.
# Minimum that tolerates one Sentinel being down without either false-positive
# or false-negative failovers.

port 26379
bind 0.0.0.0

sentinel monitor legallens-master redis-master 6379 2
sentinel down-after-milliseconds legallens-master 5000
sentinel failover-timeout legallens-master 10000
sentinel parallel-syncs legallens-master 1

sentinel resolve-hostnames yes
sentinel announce-hostnames yes
