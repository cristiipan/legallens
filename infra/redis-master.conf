# Redis master config for LegalLens.
#
# We use Redis for three things:
#   1. Worker heartbeats (TTL keys) -> registry
#   2. Per-worker task queues (RPUSH/BLPOP)
#   3. Cluster events (PUB/SUB on `worker:events`)
#
# Sentinel handles failover. Replicas auto-promote when the master dies.

bind 0.0.0.0
port 6379
protected-mode no

# AOF is more durable than RDB for queue workloads — a queued task lost on
# crash is worse than slightly slower writes.
appendonly yes
appendfsync everysec

# Keep the keyspace lean. We don't want eviction to silently drop heartbeats
# or queue entries; if we run out of memory, fail loudly instead.
maxmemory-policy noeviction
